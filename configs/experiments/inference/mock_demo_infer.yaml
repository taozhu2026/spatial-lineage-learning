_base_:
  - ../../experiments/train/mock_demo.yaml
  - ../../base/inference.yaml

experiment:
  name: mock_demo_infer

inference:
  batch_size: 2
  output_format: jsonl
  checkpoint_path: experiments/mock_demo_train/checkpoints/best.json
  inline_records:
    - cell_id: i1
      expression: [0.85, 0.15, 0.2]
      spatial_coords: [0.2, 0.2]
      clone_id: clone_a
      label: 0
    - cell_id: i2
      expression: [0.15, 0.85, 0.8]
      spatial_coords: [3.3, 3.4]
      clone_id: clone_b
      label: 1
