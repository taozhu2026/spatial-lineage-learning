_base_:
  - ../base/data.yaml

data:
  reader: inline
  normalize_expression: false
  log1p: false

dataset:
  name: spatial_lineage_dataset
  inline_records:
    train:
      - cell_id: t1
        expression: [0.9, 0.1, 0.2]
        spatial_coords: [0.0, 0.0]
        clone_id: clone_a
        label: 0
      - cell_id: t2
        expression: [0.8, 0.2, 0.2]
        spatial_coords: [0.5, 0.1]
        clone_id: clone_a
        label: 0
      - cell_id: t3
        expression: [0.2, 0.8, 0.7]
        spatial_coords: [3.0, 3.0]
        clone_id: clone_b
        label: 1
      - cell_id: t4
        expression: [0.1, 0.7, 0.9]
        spatial_coords: [3.5, 3.2]
        clone_id: clone_b
        label: 1
    val:
      - cell_id: v1
        expression: [0.7, 0.2, 0.2]
        spatial_coords: [0.2, 0.1]
        clone_id: clone_a
        label: 0
      - cell_id: v2
        expression: [0.1, 0.8, 0.8]
        spatial_coords: [3.1, 3.4]
        clone_id: clone_b
        label: 1
    test:
      - cell_id: s1
        expression: [0.9, 0.2, 0.1]
        spatial_coords: [0.1, 0.2]
        clone_id: clone_a
        label: 0
      - cell_id: s2
        expression: [0.2, 0.9, 0.7]
        spatial_coords: [3.2, 3.1]
        clone_id: clone_b
        label: 1
